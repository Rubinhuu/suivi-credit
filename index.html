<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#f7f8fa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Suivi de crédits</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Firebase (chargé depuis le CDN au lancement dans le navigateur) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg:#f7f8fa; --surface:#fff; --text:#11151c; --muted:#6b7280;
    --accent:#0f766e; --accent2:#2563eb; --line:#eceef1; --danger:#dc2626; --ok:#16a34a;
    --radius:16px; --shadow:0 4px 16px rgba(20,30,50,.06);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);min-height:100vh;
    padding:max(18px,env(safe-area-inset-top)) 16px calc(96px + env(safe-area-inset-bottom));}
  .wrap{max-width:480px;margin:0 auto}

  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px}
  .top .lab{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .top .name{font-size:18px;font-weight:800;letter-spacing:-.01em;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .top .grow{min-width:0}
  .iconbtn{position:relative;width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--surface);
    display:grid;place-items:center;cursor:pointer;color:var(--text);box-shadow:var(--shadow);flex:0 0 auto}
  .iconbtn:active{transform:scale(.96)}
  .iconbtn svg{width:20px;height:20px}
  .syncdot{position:absolute;top:-3px;right:-3px;width:11px;height:11px;border-radius:50%;
    background:var(--muted);border:2px solid var(--surface)}
  .syncdot.ok{background:var(--ok)}.syncdot.err{background:var(--danger)}

  .hero{background:var(--surface);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:16px}
  .hero .cap{font-size:12px;color:var(--muted);font-weight:600}
  .hero .big{font-size:32px;font-weight:800;letter-spacing:-.02em;margin-top:3px}
  .hero .big small{font-size:15px;font-weight:600;opacity:.55;margin-left:5px}

  .ccard{display:block;width:100%;text-align:left;background:var(--surface);border:none;
    border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:12px;cursor:pointer}
  .ccard:active{transform:scale(.995)}
  .cc-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .cc-label{font-size:15px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cc-rest{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
  .cc-rest.neg{color:var(--danger)}
  .cc-sub{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:9px;font-variant-numeric:tabular-nums}

  .balance{background:var(--surface);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:14px}
  .balance .cap{font-size:12px;color:var(--muted);font-weight:600}
  .balance .big{font-size:36px;font-weight:800;letter-spacing:-.02em;margin:4px 0 2px}
  .balance .big small{font-size:16px;font-weight:600;opacity:.55;margin-left:5px}
  .balance .big.neg{color:var(--danger)}
  .bar{height:8px;border-radius:99px;background:var(--line);overflow:hidden;margin:14px 0 9px}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}
  .bar>i.over{background:var(--danger)}
  .balance .sub{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted)}
  .balance .sub b{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums}

  .card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .card .hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .card h3{font-size:14px;font-weight:800}
  .link{font-size:12.5px;font-weight:700;color:var(--accent2);background:none;border:none;cursor:pointer;padding:4px}

  .chartwrap{display:flex;align-items:center;gap:16px}
  .donut{flex:0 0 130px}
  .legend{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
  .legend .row{display:flex;align-items:center;gap:8px;font-size:13px}
  .legend .sw{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .legend .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .legend .pc{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px}
  .legend .vl{font-weight:700;font-variant-numeric:tabular-nums}

  .exp{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .exp:last-child{border-bottom:none}
  .exp .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:16px;font-weight:800;color:#fff;flex:0 0 auto}
  .exp .mid{flex:1;min-width:0}
  .exp .t{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .exp .c{font-size:12px;color:var(--muted);margin-top:1px}
  .exp .amt{font-weight:700;font-variant-numeric:tabular-nums;font-size:14px;white-space:nowrap}

  .empty{text-align:center;color:var(--muted);font-size:13px;padding:18px 6px;line-height:1.5}

  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom));
    width:min(448px,calc(100% - 32px));border:none;border-radius:14px;padding:16px;
    font-size:15px;font-weight:800;color:#fff;cursor:pointer;
    background:linear-gradient(90deg,var(--accent),var(--accent2));box-shadow:0 10px 26px rgba(15,118,110,.4)}
  .fab:active{transform:translateX(-50%) scale(.99)}

  .ov{position:fixed;inset:0;background:rgba(17,21,28,.45);backdrop-filter:blur(2px);
    display:none;align-items:flex-end;justify-content:center;z-index:50}
  .ov.on{display:flex}
  .sheet{background:var(--surface);width:100%;max-width:480px;border-radius:22px 22px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));animation:up .25s ease;max-height:92vh;overflow:auto}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sheet h2{font-size:17px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .sheet h2 .x{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1;padding:0 4px}
  label.fld{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 6px}
  input[type=text],input[type=number],input[type=date]{
    width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:16px;
    background:var(--bg);color:var(--text);font-family:inherit}
  input:focus{outline:none;border-color:var(--accent2)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
  .chip{border:1.5px solid var(--line);background:var(--surface);border-radius:99px;padding:8px 13px;
    font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;color:var(--text)}
  .chip .d{width:10px;height:10px;border-radius:50%}
  .chip.sel{border-color:var(--text)}
  .chip.add{border-style:dashed;color:var(--accent2);font-weight:700}
  .swatches{display:flex;flex-wrap:wrap;gap:10px;margin-top:2px}
  .swatches .s{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent}
  .swatches .s.sel{border-color:var(--text)}
  .btn{width:100%;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;
    color:#fff;background:linear-gradient(90deg,var(--accent),var(--accent2));margin-top:20px}
  .btn:active{transform:scale(.99)}
  .btn.ghost{background:none;color:var(--muted);box-shadow:none;margin-top:8px;font-weight:700}
  .btn.del{background:none;color:var(--danger);border:1.5px solid var(--line);margin-top:8px}

  .catitem{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
  .catitem:last-child{border-bottom:none}
  .catitem .d{width:14px;height:14px;border-radius:4px;flex:0 0 auto}
  .catitem .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;font-size:14px}
  .catitem .u{font-size:11px;color:var(--muted);flex:0 0 auto}
  .catitem .ed{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:13px;font-weight:700;padding:6px}
  .catitem .rm{background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px;font-weight:700;padding:6px}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
  .seclab{font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:22px 0 4px}
  .statusbox{font-size:13px;font-weight:600;padding:11px 13px;border-radius:11px;background:var(--bg);margin-top:8px}
  .statusbox b{font-weight:800}
  .hide{display:none}
</style>
</head>
<body>
<div class="wrap">

  <!-- ====== ACCUEIL ====== -->
  <section id="home">
    <div class="top">
      <div class="grow"><div class="lab">Suivi</div><div class="name">Mes crédits</div></div>
      <button class="iconbtn" id="btnBackup" aria-label="Synchronisation et sauvegarde">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
        <span class="syncdot" id="syncDot"></span>
      </button>
    </div>
    <div id="heroArea"></div>
    <div id="cardsArea"></div>
  </section>

  <!-- ====== DÉTAIL ====== -->
  <section id="detail" class="hide">
    <div class="top">
      <button class="iconbtn" id="btnBack" aria-label="Retour">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="grow"><div class="lab">Crédit</div><div class="name" id="dName">—</div></div>
      <button class="iconbtn" id="btnEditCredit" aria-label="Modifier le crédit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
      </button>
    </div>

    <div class="balance">
      <div class="cap">Solde restant</div>
      <div class="big" id="rest">—</div>
      <div class="bar"><i id="barFill"></i></div>
      <div class="sub"><span>Dépensé <b id="spent">—</b></span><span>Crédit <b id="total">—</b></span></div>
    </div>

    <div class="card">
      <div class="hd"><h3>Répartition</h3><button class="link" id="btnCats">Gérer les catégories</button></div>
      <div id="chartArea"></div>
    </div>

    <div class="card">
      <div class="hd"><h3>Dépenses</h3><span class="link" id="countLab" style="color:var(--muted);font-weight:600"></span></div>
      <div id="listArea"></div>
    </div>
  </section>
</div>

<button class="fab" id="fab">+ Ajouter</button>
<div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>

<script>
/* =========================================================
   CONFIGURATION FIREBASE — colle ici les valeurs de TON projet.
   Tant que c'est vide, l'app marche en local (sans synchro).
   ========================================================= */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCVbMA4U433PWTe9Ieuq9r_JdJZvWyPv4s",
  authDomain: "suivi-credit.firebaseapp.com",
  projectId: "suivi-credit",
  storageBucket: "suivi-credit.firebasestorage.app",
  messagingSenderId: "6481501340",
  appId: "1:6481501340:web:b064bd2a0b88b24d756159"
};

/* ---------- stockage local (repli mémoire si indisponible) ---------- */
const KEY='suiviCredits_v2', OLD='suiviCredit_v1', SYNC_KEY='suiviCredits_syncCode';
let mem={};
function getLS(k){try{return localStorage.getItem(k)}catch(e){return mem[k]||null}}
function setLS(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}

let data, currentId=null;
function load(){
  const r=getLS(KEY);
  if(r){try{data=JSON.parse(r)}catch(e){data=null}}
  if(!data){
    data={credits:[]};
    const old=getLS(OLD);
    if(old){try{const o=JSON.parse(old);
      if(o&&o.credit&&o.credit.setup){data.credits.push({id:uid(),label:o.credit.label||'Mon crédit',
        amount:o.credit.amount||0,categories:o.categories||[],expenses:o.expenses||[]});}}catch(e){}}
    saveLocal();
  }
  normalize(data);
}
function normalize(d){
  d.credits=Array.isArray(d.credits)?d.credits:Object.values(d.credits||{});
  d.credits.forEach(c=>{
    c.categories=Array.isArray(c.categories)?c.categories:Object.values(c.categories||{});
    c.expenses=Array.isArray(c.expenses)?c.expenses:Object.values(c.expenses||{});
  });
  return d;
}
function saveLocal(){setLS(KEY,JSON.stringify(data))}

/* ---------- synchronisation Firebase (Cloud Firestore) ---------- */
let syncRef=null, unsub=null, applyingRemote=false, pushTimer=null;
const syncConfigured=()=>!!(FIREBASE_CONFIG.apiKey&&FIREBASE_CONFIG.projectId);
const getSyncCode=()=>getLS(SYNC_KEY)||'';

function setSyncStatus(state){ // 'off' | 'ok' | 'err'
  const dot=document.getElementById('syncDot');
  dot.classList.remove('ok','err');
  if(state==='ok')dot.classList.add('ok');
  if(state==='err')dot.classList.add('err');
}
function initSync(){
  if(unsub){unsub();unsub=null}
  syncRef=null;
  if(!syncConfigured()){setSyncStatus('off');return}
  const code=getSyncCode();
  if(!code){setSyncStatus('off');return}
  try{
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
    const db=firebase.firestore();
    syncRef=db.collection('credits').doc(code);
    // écoute temps réel
    unsub=syncRef.onSnapshot(snap=>{
      setSyncStatus('ok');
      if(snap.metadata.hasPendingWrites)return;      // ignore nos propres écritures
      const d=snap.exists?snap.data():null;
      if(d&&d.json){
        try{const remote=JSON.parse(d.json);
          if(JSON.stringify(remote)!==JSON.stringify(data)){
            applyingRemote=true;data=normalize(remote);saveLocal();render();applyingRemote=false;
          }
        }catch(e){}
      }
    },()=>setSyncStatus('err'));
    // si le document n'existe pas encore, on y pousse l'état local
    syncRef.get().then(s=>{if(!s.exists)pushCloud()}).catch(()=>setSyncStatus('err'));
  }catch(e){setSyncStatus('err')}
}
function pushCloud(){
  if(!syncRef)return;
  try{syncRef.set({json:JSON.stringify(data),ts:Date.now()})}catch(e){}
}
function enableSync(code){setLS(SYNC_KEY,code.trim());initSync()}
function disableSync(){if(unsub){unsub();unsub=null}syncRef=null;setLS(SYNC_KEY,'');setSyncStatus('off')}

/* ---------- enregistrement (local + cloud) ---------- */
function save(){
  saveLocal();
  if(syncRef&&!applyingRemote){
    clearTimeout(pushTimer);
    pushTimer=setTimeout(pushCloud,400);
  }
}

/* ---------- utilitaires ---------- */
const fmt=n=>Math.round(n).toLocaleString('fr-CH').replace(/\u00a0/g,'\u2019');
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const PALETTE=['#0f766e','#2563eb','#14b8a6','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#64748b'];
const cur=()=>data.credits.find(c=>c.id===currentId);
function nextColor(cr){const used=cr.categories.map(c=>c.color);return PALETTE.find(c=>!used.includes(c))||PALETTE[cr.categories.length%PALETTE.length]}
const catById=(cr,id)=>cr.categories.find(c=>c.id===id);
const spentOf=cr=>cr.expenses.reduce((s,e)=>s+e.amount,0);
const fmtDate=s=>{const d=new Date(s+'T00:00:00');return d.toLocaleDateString('fr-CH',{day:'numeric',month:'short'})};
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ---------- navigation ---------- */
function render(){currentId&&cur()?showDetail():showHome()}
function showHome(){currentId=null;
  document.getElementById('home').classList.remove('hide');
  document.getElementById('detail').classList.add('hide');
  document.getElementById('fab').textContent='+ Nouveau crédit';renderHome();}
function showDetail(){
  document.getElementById('home').classList.add('hide');
  document.getElementById('detail').classList.remove('hide');
  document.getElementById('fab').textContent='+ Ajouter une dépense';renderDetail();}
function openCredit(id){currentId=id;window.scrollTo(0,0);showDetail()}

/* ---------- accueil ---------- */
function renderHome(){
  const hero=document.getElementById('heroArea');
  if(data.credits.length){const totRest=data.credits.reduce((s,c)=>s+(c.amount-spentOf(c)),0);
    hero.innerHTML=`<div class="hero"><div class="cap">Solde total restant</div>
      <div class="big">${fmt(totRest)}<small>CHF</small></div></div>`;}else hero.innerHTML='';
  const area=document.getElementById('cardsArea');
  if(!data.credits.length){area.innerHTML='<div class="empty">Aucun crédit pour l\u2019instant.<br>Touche \u00ab\u00a0+ Nouveau cr\u00e9dit\u00a0\u00bb pour commencer.</div>';return}
  area.innerHTML=data.credits.map(c=>{const sp=spentOf(c),rest=c.amount-sp,pct=c.amount>0?Math.min(sp/c.amount*100,100):0;
    return `<button class="ccard" data-id="${c.id}"><div class="cc-top"><span class="cc-label">${esc(c.label||'Cr\u00e9dit')}</span>
      <span class="cc-rest${rest<0?' neg':''}">${fmt(rest)} CHF</span></div>
      <div class="bar"><i style="width:${pct}%${sp>c.amount&&c.amount>0?';background:var(--danger)':''}"></i></div>
      <div class="cc-sub"><span>D\u00e9pens\u00e9 ${fmt(sp)}</span><span>sur ${fmt(c.amount)}</span></div></button>`;}).join('');
  area.querySelectorAll('.ccard').forEach(el=>el.onclick=()=>openCredit(el.dataset.id));
}

/* ---------- détail ---------- */
function renderDetail(){
  const cr=cur();if(!cr){showHome();return}
  document.getElementById('dName').textContent=cr.label||'Cr\u00e9dit';
  const sp=spentOf(cr),rest=cr.amount-sp;
  const rEl=document.getElementById('rest');rEl.innerHTML=fmt(rest)+'<small>CHF</small>';rEl.classList.toggle('neg',rest<0);
  document.getElementById('spent').textContent=fmt(sp);document.getElementById('total').textContent=fmt(cr.amount);
  const pct=cr.amount>0?Math.min(sp/cr.amount*100,100):0;const fill=document.getElementById('barFill');
  fill.style.width=pct+'%';fill.classList.toggle('over',sp>cr.amount&&cr.amount>0);
  renderChart(cr,sp);renderList(cr);
}
function renderChart(cr,sp){
  const area=document.getElementById('chartArea');
  if(cr.expenses.length===0){area.innerHTML='<div class="empty">Aucune d\u00e9pense pour l\u2019instant.<br>Ajoute ta premi\u00e8re d\u00e9pense pour voir la r\u00e9partition.</div>';return}
  const sums={};cr.expenses.forEach(e=>{sums[e.catId]=(sums[e.catId]||0)+e.amount});
  const items=Object.keys(sums).map(id=>({c:catById(cr,id),v:sums[id]})).filter(x=>x.c).sort((a,b)=>b.v-a.v);
  const total=items.reduce((s,x)=>s+x.v,0);const r=58,cx=80,cy=80,C=2*Math.PI*r;let off=0,seg='';
  items.forEach(x=>{const len=x.v/total*C;
    seg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${x.c.color}" stroke-width="24"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=len;});
  const svg=`<svg class="donut" viewBox="0 0 160 160" aria-hidden="true">${seg}
    <text x="80" y="74" text-anchor="middle" font-size="12" fill="#6b7280">d\u00e9pens\u00e9</text>
    <text x="80" y="95" text-anchor="middle" font-size="17" font-weight="800" fill="#11151c">${fmt(sp)}</text></svg>`;
  const leg=items.map(x=>`<div class="row"><span class="sw" style="background:${x.c.color}"></span>
    <span class="nm">${esc(x.c.name)}</span><span class="pc">${Math.round(x.v/total*100)}%</span><span class="vl">${fmt(x.v)}</span></div>`).join('');
  area.innerHTML=`<div class="chartwrap">${svg}<div class="legend">${leg}</div></div>`;
}
function renderList(cr){
  const area=document.getElementById('listArea');const n=cr.expenses.length;
  document.getElementById('countLab').textContent=n?n+(n>1?' d\u00e9penses':' d\u00e9pense'):'';
  if(n===0){area.innerHTML='<div class="empty">Tes d\u00e9penses appara\u00eetront ici.</div>';return}
  const sorted=[...cr.expenses].sort((a,b)=>(b.date||'').localeCompare(a.date)||b.id.localeCompare(a.id));
  area.innerHTML=sorted.map(e=>{const c=catById(cr,e.catId);const col=c?c.color:'#94a3b8';
    const badge=c&&c.emoji?c.emoji:(c?c.name[0].toUpperCase():'?');
    return `<div class="exp" data-id="${e.id}"><span class="ic" style="background:${col}">${esc(badge)}</span>
      <div class="mid"><div class="t">${esc(e.desc||(c?c.name:'D\u00e9pense'))}</div>
      <div class="c">${c?esc(c.name):'Sans cat\u00e9gorie'} \u00b7 ${e.date?fmtDate(e.date):''}</div></div>
      <span class="amt">\u2212 ${fmt(e.amount)}</span></div>`;}).join('');
  area.querySelectorAll('.exp').forEach(el=>el.onclick=()=>openExpense(el.dataset.id));
}

/* ---------- sheets ---------- */
const ov=document.getElementById('ov'),sheet=document.getElementById('sheet');
function open(html){sheet.innerHTML=html;ov.classList.add('on')}
function close(){ov.classList.remove('on')}
ov.onclick=e=>{if(e.target===ov)close()};

/* --- crédit --- */
function creditForm(cr){
  open(`<h2>${cr?'Modifier le cr\u00e9dit':'Nouveau cr\u00e9dit'}<button class="x" id="cx">\u00d7</button></h2>
    <label class="fld">Libell\u00e9</label><input type="text" id="cLabel" placeholder="ex. Cr\u00e9dit r\u00e9novation" value="${cr?esc(cr.label||''):''}">
    <label class="fld">Montant du cr\u00e9dit (CHF)</label><input type="number" inputmode="decimal" id="cAmount" placeholder="ex. 25000" value="${cr?cr.amount:''}">
    <button class="btn" id="cSave">${cr?'Enregistrer':'Cr\u00e9er le cr\u00e9dit'}</button>
    ${cr?'<button class="btn del" id="cDel">Supprimer ce cr\u00e9dit</button>':''}`);
  document.getElementById('cx').onclick=close;
  document.getElementById('cSave').onclick=()=>{
    const amt=parseFloat(document.getElementById('cAmount').value);
    if(!(amt>0)){document.getElementById('cAmount').focus();return}
    const label=document.getElementById('cLabel').value.trim();
    if(cr){cr.label=label;cr.amount=amt;save();renderDetail()}
    else{const nc={id:uid(),label,amount:amt,categories:[],expenses:[]};data.credits.push(nc);save();close();openCredit(nc.id);return}
    close();
  };
  if(cr)document.getElementById('cDel').onclick=()=>{
    if(!confirm('Supprimer ce cr\u00e9dit et toutes ses d\u00e9penses ?'))return;
    data.credits=data.credits.filter(c=>c.id!==cr.id);save();close();showHome();
  };
}

/* --- dépense --- */
let pickCat=null;
function expenseForm(e){
  const cr=cur();pickCat=e?e.catId:(cr.categories[0]?cr.categories[0].id:null);
  const today=new Date().toISOString().slice(0,10);
  open(`<h2>${e?'Modifier la d\u00e9pense':'Nouvelle d\u00e9pense'}<button class="x" id="cx">\u00d7</button></h2>
    <label class="fld">Montant (CHF)</label><input type="number" inputmode="decimal" id="eAmt" placeholder="0" value="${e?e.amount:''}">
    <label class="fld">Description</label><input type="text" id="eDesc" placeholder="ex. Carrelage" value="${e?esc(e.desc||''):''}">
    <label class="fld">Cat\u00e9gorie</label><div class="chips" id="chips"></div><div id="newCat"></div>
    <label class="fld">Date</label><input type="date" id="eDate" value="${e?e.date:today}">
    <button class="btn" id="eSave">${e?'Enregistrer':'Ajouter'}</button>
    ${e?'<button class="btn del" id="eDel">Supprimer</button>':''}`);
  document.getElementById('cx').onclick=close;drawChips();
  document.getElementById('eSave').onclick=()=>{
    const amt=parseFloat(document.getElementById('eAmt').value);
    if(!(amt>0)){document.getElementById('eAmt').focus();return}
    if(!pickCat){alert('Choisis ou cr\u00e9e une cat\u00e9gorie.');return}
    const rec={desc:document.getElementById('eDesc').value.trim(),amount:amt,catId:pickCat,date:document.getElementById('eDate').value||today};
    if(e){Object.assign(e,rec)}else{cr.expenses.push({id:uid(),...rec})}
    save();renderDetail();close();
  };
  if(e)document.getElementById('eDel').onclick=()=>{cr.expenses=cr.expenses.filter(x=>x.id!==e.id);save();renderDetail();close();};
  if(!e&&cr.categories.length===0)showNewCat();
}
function drawChips(){
  const cr=cur(),box=document.getElementById('chips');
  box.innerHTML=cr.categories.map(c=>`<button class="chip${c.id===pickCat?' sel':''}" data-id="${c.id}">
    <span class="d" style="background:${c.color}"></span>${esc(c.emoji?c.emoji+' ':'')}${esc(c.name)}</button>`).join('')
    +`<button class="chip add" id="chipNew">+ Nouvelle</button>`;
  box.querySelectorAll('.chip[data-id]').forEach(b=>b.onclick=()=>{pickCat=b.dataset.id;drawChips();document.getElementById('newCat').innerHTML=''});
  document.getElementById('chipNew').onclick=showNewCat;
}
let newColor=null;
function showNewCat(){
  const cr=cur();newColor=nextColor(cr);
  document.getElementById('newCat').innerHTML=`<div style="border:1.5px dashed var(--line);border-radius:12px;padding:14px;margin-top:10px">
      <label class="fld" style="margin-top:0">Nom de la cat\u00e9gorie</label><input type="text" id="ncName" placeholder="ex. Travaux">
      <label class="fld">Emoji (optionnel)</label><input type="text" id="ncEmoji" maxlength="2" placeholder="\ud83d\udd28" style="width:90px">
      <label class="fld">Couleur</label><div class="swatches" id="ncSw"></div>
      <button class="btn" id="ncAdd" style="margin-top:14px">Cr\u00e9er la cat\u00e9gorie</button></div>`;
  const sw=document.getElementById('ncSw');
  sw.innerHTML=PALETTE.map(c=>`<span class="s${c===newColor?' sel':''}" data-c="${c}" style="background:${c}"></span>`).join('');
  sw.querySelectorAll('.s').forEach(s=>s.onclick=()=>{newColor=s.dataset.c;sw.querySelectorAll('.s').forEach(x=>x.classList.toggle('sel',x.dataset.c===newColor))});
  document.getElementById('ncAdd').onclick=()=>{
    const nm=document.getElementById('ncName').value.trim();if(!nm){document.getElementById('ncName').focus();return}
    const cat={id:uid(),name:nm,color:newColor,emoji:document.getElementById('ncEmoji').value.trim()};
    cr.categories.push(cat);save();pickCat=cat.id;document.getElementById('newCat').innerHTML='';drawChips();
  };
  document.getElementById('ncName').focus();
}
function openExpense(id){const e=cur().expenses.find(x=>x.id===id);if(e)expenseForm(e)}

/* --- catégories --- */
function openCats(){
  const cr=cur();const usage={};cr.expenses.forEach(e=>usage[e.catId]=(usage[e.catId]||0)+1);
  const list=cr.categories.length?cr.categories.map(c=>`<div class="catitem"><span class="d" style="background:${c.color}"></span>
      <span class="nm">${esc(c.emoji?c.emoji+' ':'')}${esc(c.name)}</span>
      <span class="u">${usage[c.id]?usage[c.id]+' d\u00e9p.':'inutilis\u00e9e'}</span>
      <button class="ed" data-id="${c.id}">Modifier</button><button class="rm" data-id="${c.id}">Suppr.</button></div>`).join('')
    :'<div class="empty">Aucune cat\u00e9gorie. Cr\u00e9e-en au moment d\u2019ajouter une d\u00e9pense.</div>';
  open(`<h2>Cat\u00e9gories<button class="x" id="cx">\u00d7</button></h2>${list}
    <div class="hint">Modifier une cat\u00e9gorie met \u00e0 jour toutes ses d\u00e9penses. Pour la supprimer, elle doit \u00eatre vide.</div>
    <button class="btn ghost" id="cxBtn">Fermer</button>`);
  document.getElementById('cx').onclick=close;document.getElementById('cxBtn').onclick=close;
  sheet.querySelectorAll('.ed').forEach(b=>b.onclick=()=>editCat(b.dataset.id));
  sheet.querySelectorAll('.rm').forEach(b=>b.onclick=()=>{
    if(usage[b.dataset.id]){alert('Cette cat\u00e9gorie contient des d\u00e9penses. Supprime-les d\u2019abord.');return}
    cr.categories=cr.categories.filter(c=>c.id!==b.dataset.id);save();renderDetail();openCats();});
}
function editCat(id){
  const cr=cur(),c=catById(cr,id);if(!c)return;let col=c.color;
  open(`<h2>Modifier la cat\u00e9gorie<button class="x" id="cx">\u00d7</button></h2>
    <label class="fld">Nom</label><input type="text" id="ecName" value="${esc(c.name)}">
    <label class="fld">Emoji (optionnel)</label><input type="text" id="ecEmoji" maxlength="2" placeholder="\ud83d\udd28" style="width:90px" value="${esc(c.emoji||'')}">
    <label class="fld">Couleur</label><div class="swatches" id="ecSw"></div>
    <button class="btn" id="ecSave">Enregistrer</button><button class="btn ghost" id="ecBack">Retour</button>`);
  document.getElementById('cx').onclick=close;document.getElementById('ecBack').onclick=openCats;
  const sw=document.getElementById('ecSw');
  sw.innerHTML=PALETTE.map(p=>`<span class="s${p===col?' sel':''}" data-c="${p}" style="background:${p}"></span>`).join('');
  sw.querySelectorAll('.s').forEach(s=>s.onclick=()=>{col=s.dataset.c;sw.querySelectorAll('.s').forEach(x=>x.classList.toggle('sel',x.dataset.c===col))});
  document.getElementById('ecSave').onclick=()=>{
    const nm=document.getElementById('ecName').value.trim();if(!nm){document.getElementById('ecName').focus();return}
    c.name=nm;c.emoji=document.getElementById('ecEmoji').value.trim();c.color=col;save();renderDetail();openCats();};
}

/* --- synchro & sauvegarde --- */
function openBackup(){
  const code=getSyncCode();
  const status=!syncConfigured()
    ? `<div class="statusbox">Synchronisation <b>non configur\u00e9e</b>.<br>Ajoute ta config Firebase dans le fichier (voir notice).</div>`
    : (code
      ? `<div class="statusbox">Synchronisation <b>activ\u00e9e</b><br>Code\u00a0: <b>${esc(code)}</b></div>`
      : `<div class="statusbox">Synchronisation <b>d\u00e9sactiv\u00e9e</b> sur cet appareil.</div>`);
  open(`<h2>Synchronisation<button class="x" id="cx">\u00d7</button></h2>
    ${status}
    ${syncConfigured()?`
      <label class="fld">Code de synchronisation</label>
      <input type="text" id="syncCode" placeholder="ex. ruben-credits-2026" value="${esc(code)}">
      <div class="hint">Saisis le m\u00eame code sur chaque appareil pour partager les m\u00eames cr\u00e9dits. Garde-le secret.</div>
      <button class="btn" id="syncOn">${code?'Mettre \u00e0 jour le code':'Activer la synchronisation'}</button>
      ${code?'<button class="btn del" id="syncOff">D\u00e9sactiver sur cet appareil</button>':''}`:''}
    <div class="seclab">Sauvegarde manuelle</div>
    <button class="btn ghost" id="bExport" style="margin-top:8px">Exporter tous les cr\u00e9dits (.json)</button>
    <button class="btn ghost" id="bImport" style="margin-top:0">Importer une sauvegarde</button>
    <input type="file" id="bFile" accept="application/json" style="display:none">`);
  document.getElementById('cx').onclick=close;
  if(syncConfigured()){
    document.getElementById('syncOn').onclick=()=>{
      const v=document.getElementById('syncCode').value.trim();
      if(!v){document.getElementById('syncCode').focus();return}
      enableSync(v);close();
    };
    const off=document.getElementById('syncOff');if(off)off.onclick=()=>{disableSync();close();};
  }
  document.getElementById('bExport').onclick=exportData;
  document.getElementById('bImport').onclick=()=>document.getElementById('bFile').click();
  document.getElementById('bFile').onchange=importData;
}
function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='suivi-credits-sauvegarde.json';a.click();URL.revokeObjectURL(a.href);
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);
    if(d&&Array.isArray(d.credits)){data=normalize(d);save();showHome();close();}else alert('Fichier non reconnu.');
  }catch(e){alert('Fichier illisible.')}};
  rd.readAsText(f);
}

/* ---------- boutons ---------- */
document.getElementById('fab').onclick=()=>{currentId?expenseForm(null):creditForm(null)};
document.getElementById('btnBack').onclick=showHome;
document.getElementById('btnEditCredit').onclick=()=>creditForm(cur());
document.getElementById('btnCats').onclick=openCats;
document.getElementById('btnBackup').onclick=openBackup;

/* ---------- init ---------- */
load();showHome();initSync();

/* ---------- PWA : service worker ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));
}
</script>
